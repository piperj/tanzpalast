# Tanzpalast — video diary
#
# Each entry is a dance card:
#   dance:    the dance name (Waltz, Cha Cha, Salsa, etc.)
#   featured: the always-visible header video for this card
#   videos:   collapsed sub-videos (expand on tap)
#
# IDs are assigned automatically by the build script — do not add them here.
#
# Tags drive collection filtering — include the collection tag on every video
# that belongs to that collection:
#   standard | smooth | latin | rhythm | club
#
# Add any descriptive keywords alongside the collection tag:
#   e.g. tags: [standard, footwork, rise-and-fall]
#
# type field (optional, defaults to "video"):
#   video | pdf | image
#
# Collections and their dances:
#   Standard: Waltz, Tango, Viennese Waltz, Foxtrot, Quickstep
#   Smooth:   American Waltz, American Tango, American Foxtrot, Viennese Waltz
#   Latin:    Cha Cha, Samba, Rumba, Paso Doble, Jive
#   Rhythm:   Cha Cha, Bolero, East Coast Swing, Mambo, Rumba
#   Club:     Salsa, Bachata, Kizomba, Swing, Zouk, Hustle

- dance: Waltz
  featured:
